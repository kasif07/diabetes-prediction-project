<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
/* ================= FONT COLORS ================= */

/* Headings */
h1, h2, h3, h4, h5 {
    font-weight: 600;
}

/* ---------- DARK MODE ---------- */
body.dark {
    color: #e0e0e0;
}

body.dark h3 {
    color: #e3f2fd; /* light blue heading */
}

body.dark label {
    color: #cfd8dc; /* soft grey labels */
}

body.dark .form-control {
    background: #2a2a3d;
    color: #ffffff;
}

body.dark .form-control::placeholder {
    color: #9aa0a6;
}

body.dark .alert {
    color: #ffffff;
}

/* ---------- LIGHT MODE ---------- */
body.light {
    color: #212529;
}

body.light h3 {
    color: #0d6efd; /* blue heading */
}

body.light label {
    color: #343a40;
}

body.light .form-control {
    background: #ffffff;
    color: #212529;
}

body.light .form-control::placeholder {
    color: #6c757d;
}

body.light .alert {
    color: #212529;
}

/* ---------- ICON COLORS ---------- */
.fa-heartbeat,
.fa-magnifying-glass-chart,
.fa-sun,
.fa-moon {
    color: #ff4d4d; /* medical red */
}

        body.light {
            background: #f4f6f9;
            color: #212529;
        }

        body.dark {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
        }

        .card {
            border-radius: 16px;
            border: none;
        }

        body.dark .card {
            background: #1e1e2f;
        }

        body.light .card {
            background: #ffffff;
        }

        .form-control {
            border-radius: 8px;
        }

        body.dark .form-control {
            background: #2a2a3d;
            color: #ffffff;
            border: none;
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .result-box {
            display: none;
        }
    </style>
</head>

<body class="dark">

<button class="btn btn-outline-light toggle-btn" id="toggleTheme">
    <i class="fas fa-moon"></i>
</button>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg animate__animated animate__fadeInDown">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        <i class="fas fa-heartbeat text-danger"></i>
                        Diabetes Prediction
                    </h3>

                    <form id="prediction-form">

                        <input class="form-control mb-3" type="number" name="Pregnancies" placeholder="Pregnancies" required>
                        <input class="form-control mb-3" type="number" name="Glucose" placeholder="Glucose" required>
                        <input class="form-control mb-3" type="number" name="BloodPressure" placeholder="Blood Pressure" required>
                        <input class="form-control mb-3" type="number" name="SkinThickness" placeholder="Skin Thickness" required>
                        <input class="form-control mb-3" type="number" name="Insulin" placeholder="Insulin" required>
                        <input class="form-control mb-3" type="number" step="0.1" name="BMI" placeholder="BMI" required>
                        <input class="form-control mb-3" type="number" step="0.001" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required>
                        <input class="form-control mb-3" type="number" name="Age" placeholder="Age" required>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-magnifying-glass-chart"></i> Predict
                        </button>
                    </form>

                    <div id="result" class="alert mt-4 result-box"></div>

                    <canvas id="riskChart" class="mt-4"></canvas>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
