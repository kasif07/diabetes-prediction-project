<!DOCTYPE html>
<html>
<head>
<title>Diabetes Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Diabetes Prediction System</h2>

<div class="card p-4">

<input id="Pregnancies" class="form-control mb-2" placeholder="Pregnancies">
<input id="Glucose" class="form-control mb-2" placeholder="Glucose">
<input id="BloodPressure" class="form-control mb-2" placeholder="Blood Pressure">
<input id="SkinThickness" class="form-control mb-2" placeholder="Skin Thickness">
<input id="Insulin" class="form-control mb-2" placeholder="Insulin">
<input id="BMI" class="form-control mb-2" placeholder="BMI">
<input id="DiabetesPedigreeFunction" class="form-control mb-2" placeholder="Diabetes Pedigree">
<input id="Age" class="form-control mb-3" placeholder="Age">

<button onclick="predict()" class="btn btn-primary w-100">
Predict
</button>

<h4 class="text-center mt-3" id="result"></h4>

<canvas id="chart"></canvas>

</div>

</div>

<script>

async function predict(){

let data = {
Pregnancies:Number(document.getElementById("Pregnancies").value),
Glucose:Number(document.getElementById("Glucose").value),
BloodPressure:Number(document.getElementById("BloodPressure").value),
SkinThickness:Number(document.getElementById("SkinThickness").value),
Insulin:Number(document.getElementById("Insulin").value),
BMI:Number(document.getElementById("BMI").value),
DiabetesPedigreeFunction:Number(document.getElementById("DiabetesPedigreeFunction").value),
Age:Number(document.getElementById("Age").value)
}

let response = await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result = await response.json()

document.getElementById("result").innerHTML =
"Prediction: " + result.prediction_label

let diabetic = result.confidence.Diabetic * 100
let nondiabetic = result.confidence["Non-Diabetic"] * 100

new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: ["Non-Diabetic","Diabetic"],
datasets: [{
label: "Prediction Confidence",
data: [nondiabetic, diabetic]
}]
}
})

}

</script>

</body>
</html>
